{% extends "base.html" %}
{% block title %}Reports{% endblock %}
{% block content %}
<div class="d-flex flex-column flex-md-row justify-content-between align-items-start gap-3 mb-4">
    <div>
        <h1 class="h3 fw-bold mb-1">Financial Reports</h1>
        <p class="text-muted">Comprehensive analytics of your spending and income patterns.</p>
    </div>
    <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline-primary btn-sm">← Back</a>
</div>

<div class="row g-4 mb-4">
    <div class="col-lg-6">
        <div class="card soft-card p-4">
            <h3 class="h5 fw-bold mb-4">Expenses by Category</h3>
            <canvas id="reportCategoryChart" style="max-height: 300px;"></canvas>
        </div>
    </div>
    <div class="col-lg-6">
        <div class="card soft-card p-4">
            <h3 class="h5 fw-bold mb-4">Income by Source</h3>
            <canvas id="reportSourceChart" style="max-height: 300px;"></canvas>
        </div>
    </div>
</div>

<div class="row g-4">
    <div class="col-12">
        <div class="card soft-card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="h5 fw-bold mb-0">Monthly Income vs Expenses Trend</h3>
            </div>
            <canvas id="reportLineChart" style="max-height: 320px;"></canvas>
        </div>
    </div>
</div>

<script>
    const reportCategoryLabels = {{ category_labels | tojson }};
    const reportCategoryValues = {{ category_values | tojson }};
    const reportSourceLabels = {{ source_labels | tojson }};
    const reportSourceValues = {{ source_values | tojson }};
    const reportMonthLabels = {{ month_labels | tojson }};
    const reportMonthExpenses = {{ month_expenses | tojson }};
    const reportMonthIncomes = {{ month_incomes | tojson }};
</script>
{% endblock %}
