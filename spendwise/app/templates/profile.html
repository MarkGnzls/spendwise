{% extends "base.html" %}
{% block title %}Profile{% endblock %}
{% block content %}
<div class="row justify-content-center mb-4">
    <div class="col-xl-6 col-lg-8">
        <div class="card soft-card p-5">
            <h1 class="h3 fw-bold mb-1">Account Settings</h1>
            <p class="text-muted mb-4">Manage your profile and security preferences.</p>
            <form method="POST" action="{{ url_for('profile.profile') }}">
                <div class="mb-4">
                    <label class="form-label fw-semibold">Username</label>
                    <input type="text" class="form-control" name="username" value="{{ current_user.username }}" required />
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Email Address</label>
                    <input type="email" class="form-control" name="email" value="{{ current_user.email }}" required />
                </div>
                <hr class="my-4" />
                <h5 class="fw-bold mb-3">Change Password</h5>
                <div class="mb-3">
                    <label class="form-label fw-semibold">New Password</label>
                    <input type="password" class="form-control" name="password" placeholder="Leave blank to keep current" />
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Confirm Password</label>
                    <input type="password" class="form-control" name="confirm" placeholder="Repeat new password" />
                </div>
                <button class="btn btn-success w-100 py-2 fw-semibold" type="submit">Save Changes</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
