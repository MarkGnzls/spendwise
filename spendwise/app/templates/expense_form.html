{% extends "base.html" %}
{% block title %}Edit Expense{% endblock %}
{% block content %}
<div class="row justify-content-center mb-4">
    <div class="col-xl-6 col-lg-8">
        <div class="card soft-card p-5">
            <h1 class="h3 fw-bold mb-1">Edit Expense</h1>
            <p class="text-muted mb-4">Update your expense details.</p>
            <form method="POST" action="{{ url_for('expenses.edit_expense', item_id=expense.id) }}">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Category</label>
                    <select class="form-select" name="category">
                        {% for option in categories %}
                            <option value="{{ option }}" {% if expense.category == option %}selected{% endif %}>{{ option }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Amount</label>
                    <input type="number" step="0.01" class="form-control" name="amount" value="{{ '%.2f'|format(expense.amount) }}" required />
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Date</label>
                    <input type="date" class="form-control" name="date_created" value="{{ expense.date_created.strftime('%Y-%m-%d') }}" />
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Description</label>
                    <textarea class="form-control" name="description" rows="3">{{ expense.description }}</textarea>
                </div>
                <button class="btn btn-success w-100 py-2 fw-semibold" type="submit">Save Changes</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
